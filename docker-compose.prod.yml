# ── Praxarch — production / hosted stack ─────────────────────────────
# No bind mounts, no Docker socket, no local repo paths.
# Praxarch reaches deployment targets via Coolify API + SSH (openssh in API image).
#
# Usage:
#   cp .env.production.example .env
#   docker compose -f docker-compose.prod.yml up -d --build
#
# TLS: terminate at Caddy (included) or an external ALB / Cloudflare.

name: praxarch

services:
  postgres:
    image: postgres:16-alpine
    container_name: praxarch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-praxarch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-praxarch}
    volumes:
      - praxarch_pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-praxarch} -d ${POSTGRES_DB:-praxarch}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [praxarch]

  redis:
    image: redis:7-alpine
    container_name: praxarch-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - praxarch_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [praxarch]

  api:
    build:
      context: ./apps/api
      target: prod
    container_name: praxarch-api
    restart: unless-stopped
    environment:
      PORT: 3901
      NODE_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
      AUTH_PROVIDER: ${AUTH_PROVIDER:-none}
      DATABASE_URL: postgres://${POSTGRES_USER:-praxarch}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-praxarch}
      REDIS_URL: redis://redis:6379
      SECRETS_ENC_KEY: ${SECRETS_ENC_KEY:?set SECRETS_ENC_KEY}
      DEPLOY_DRIVER: ${DEPLOY_DRIVER:-coolify}
      COOLIFY_API_URL: ${COOLIFY_API_URL:?set COOLIFY_API_URL}
      COOLIFY_API_TOKEN: ${COOLIFY_API_TOKEN:?set COOLIFY_API_TOKEN}
      COOLIFY_WEBHOOK_SECRET: ${COOLIFY_WEBHOOK_SECRET:-}
      PUBLIC_WEBHOOK_BASE: ${PUBLIC_WEBHOOK_BASE:-}
      GROK_API_KEY: ${GROK_API_KEY:-}
      GROK_API_URL: ${GROK_API_URL:-https://api.x.ai/v1}
      GROK_MODEL: ${GROK_MODEL:-grok-2-latest}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [praxarch]

  web:
    build:
      context: ./apps/web
      target: prod
    container_name: praxarch-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:3901
    depends_on:
      - api
    networks: [praxarch]

  caddy:
    image: caddy:2-alpine
    container_name: praxarch-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PRAXARCH_DOMAIN: ${PRAXARCH_DOMAIN:-localhost}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - praxarch_caddy_data:/data
      - praxarch_caddy_config:/config
    depends_on:
      - web
      - api
    networks: [praxarch]

networks:
  praxarch:
    name: praxarch_net

volumes:
  praxarch_pgdata:
  praxarch_redisdata:
  praxarch_caddy_data:
  praxarch_caddy_config:
